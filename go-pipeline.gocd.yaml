format_version: 10

pipelines:
  react-app-pipeline:
    group: gocd_trial   
    label_template: "${COUNT}"

    stages:

      # ======================
      # 1. LINT STAGE
      # ======================
      - lint:
          jobs:
            lint-job:
              tasks:
                - exec:
                    command: npm
                    arguments:
                      - install

                - exec:
                    command: npm
                    arguments:
                      - run
                      - lint


      # ======================
      # 2. BUILD STAGE
      # ======================
      - build:
          jobs:
            build-job:
              tasks:
                - exec:
                    command: npm
                    arguments:
                      - install

                - exec:
                    command: npm
                    arguments:
                      - run
                      - build

                - exec:
                    command: docker
                    arguments:
                      - build
                      - -t
                      - meetbikhani/jenkins_trial:v${GO_PIPELINE_COUNTER}
                      - .


      # ======================
      # 3. DEPLOY STAGE
      # ======================
      - deploy:
          jobs:
            deploy-job:
              tasks:
                - exec:
                    command: docker
                    arguments:
                      - login
                      - -u
                      - YOUR_DOCKERHUB_USERNAME
                      - -p
                      - YOUR_DOCKERHUB_PASSWORD

                - exec:
                    command: docker
                    arguments:
                      - push
                      - meetbikhani/jenkins_trial:v${GO_PIPELINE_COUNTER}
